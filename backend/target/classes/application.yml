# ── Default profile (local dev without Docker) ────────────────
spring:
  application:
    name: documind-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/documind_db
    username: documind_user
    password: ${DB_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # creates/updates tables automatically
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# ── JWT ────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:local_dev_secret_please_change_in_production}
  expiration-ms: 86400000        # 24 hours in milliseconds

# ── Actuator ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Server ─────────────────────────────────────────────────────
server:
  port: 8080

# ── Logging ────────────────────────────────────────────────────
logging:
  level:
    com.documind: DEBUG
    org.springframework.security: INFO
